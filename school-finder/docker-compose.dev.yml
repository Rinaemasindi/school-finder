services:
  postgres:
    image: postgres:16-alpine
    container_name: school-finder-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: schoolfinder
      POSTGRES_PASSWORD: schoolfinder_password
      POSTGRES_DB: schoolfinder
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U schoolfinder']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
