services:
  postgres:
    image: postgres:16-alpine
    container_name: school-finder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: schoolfinder
      POSTGRES_PASSWORD: schoolfinder_password
      POSTGRES_DB: schoolfinder
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U schoolfinder']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-finder-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://schoolfinder:schoolfinder_password@postgres:5432/schoolfinder
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - ./data-import:/app/data-import

volumes:
  postgres_data:
